name: E2E Pipeline

on:
  push:
    branches:
      - '**'

jobs:
  test:
    name: Run Python E2E Tests
    runs-on: ubuntu-latest
    
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create Virtual Environment & Install Dependencies
        run: |
          python3 -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright & Browsers
        run: |
          source .venv/bin/activate
          playwright install --with-deps chromium

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm install

      - name: Initialize Backend Database
        run: |
          source .venv/bin/activate
          cd backend
          python manage.py makemigrations
          python manage.py migrate

      - name: Start Background Services (Backend & Frontend)
        run: |
          # Start Django backend in the background
          source .venv/bin/activate
          cd backend
          python manage.py runserver &
          
          # Start React frontend in the background
          cd ../frontend
          npm run dev &
          
          # Wait for services to be up
          sleep 10

      - name: Run Playwright E2E Tests
        run: |
          source .venv/bin/activate
          # generate self-contained HTML report in the playwright-report directory
          mkdir -p playwright-report
          pytest tests/ --html=playwright-report/report.html --self-contained-html

      - name: Upload HTML Report Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
